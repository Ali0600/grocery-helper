name: Weekly scrape

# Refreshes deals on the deployed backend once a week (flyers are weekly).
# NOTE: Render free-tier SQLite is ephemeral (wiped on the next idle sleep), so this
# is transient until the backend moves to a persistent DB — but it demonstrates the
# scheduled data-refresh automation and keeps deals fresh between cold starts.
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      plz:
        description: Postal code to scrape
        default: '10713'
        required: false

permissions:
  contents: read
  issues: write # open/update an alert issue when the scrape keeps failing

jobs:
  scrape:
    name: Trigger scrape
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: POST /api/scrape (retry transient failures)
        env:
          PLZ: ${{ github.event.inputs.plz || '10713' }}
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt: scraping PLZ $PLZ (free-tier cold start can take ~30s)…"
            if curl -fsS --max-time 300 -X POST \
                 "https://grocery-helper-sw6c.onrender.com/api/scrape?plz=${PLZ}" \
                 -w "HTTP %{http_code} in %{time_total}s\n"; then
              exit 0
            fi
            echo "::warning::scrape attempt $attempt failed — retrying in 30s"
            sleep 30
          done
          echo "::error::scrape failed after 3 attempts"
          exit 1

      # A silent weekly failure is invisible; surface it as a (deduplicated) issue.
      - name: Alert on repeated failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The scheduled scrape failed on ${new Date().toISOString()}.\n\nRun: ${run}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scrape-failure',
            });
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Weekly scrape failed',
                body,
                labels: ['scrape-failure'],
              });
            }
