name: Weekly refresh

# Wipes the deployed backend's offers and re-scrapes once a week (flyers are weekly).
# Runs SUNDAY MORNING: the current week's flyers are Mon–Sat, so by Sunday they're spent
# and the next week's brochures are already discoverable — refreshing now means fresh deals
# are loaded before the app's weekly cache goes stale (it expires past Sunday).
# Uses POST /api/reset (wipe + re-scrape), not /api/scrape (in-place upsert), so stale rows
# the new scrape no longer touches are cleared too — a clean weekly set, not an accreting one.
# NOTE: Render free-tier SQLite is ephemeral (wiped on the next idle sleep), so this is
# transient until the backend moves to a persistent DB — but it demonstrates the scheduled
# data-refresh automation and keeps deals fresh between cold starts.
on:
  schedule:
    - cron: '0 6 * * 0' # Sundays 06:00 UTC (07:00 CET / 08:00 CEST Berlin)
  workflow_dispatch:
    inputs:
      plz:
        description: Postal code to scrape (blank → SCRAPE_PLZ secret, else 10115)
        required: false

permissions:
  contents: read
  issues: write # open/update an alert issue when the refresh keeps failing

jobs:
  refresh:
    name: Wipe and re-scrape
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Needed for the data-quality gate script below; the reset step itself is pure curl.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Wake the service BEFORE the reset, and let it settle.
      #
      # The free tier sleeps, so POSTing /api/reset cold makes the container start, run its own
      # boot scrape of DEFAULT_PLZ (~13 outbound calls), and only then serve our reset — which
      # deletes everything that boot scrape just wrote and scrapes again, hitting the same five
      # publisher pages a second time within about a minute. On 2026-07-19 that doubled burst came
      # back thin: three chains got an empty brochure list (HTTP 200, no error) and silently fell
      # back to sample data; the identical request ten minutes later was fine.
      #
      # /health only answers once startup — boot scrape included — has finished, so this both
      # absorbs the cold start and spaces our two bursts apart.
      # This is a warm-up, not a gate: if /health can't be reached the reset step's own retries
      # are the place to fail, so never fail the job here.
      - name: Wake the service and let its boot scrape settle
        run: |
          BASE=https://grocery-helper-sw6c.onrender.com
          curl -fsS --max-time 300 --retry 2 --retry-all-errors --retry-delay 15 \
               "$BASE/health" -w " (health answered in %{time_total}s)\n" \
            || echo "::warning::health check did not answer — continuing to the reset anyway"
          echo "pausing ${SETTLE_S}s so our scrape isn't a second burst on the same pages…"
          sleep "${SETTLE_S}"
        env:
          SETTLE_S: 60

      - name: POST /api/reset (retry transient failures)
        env:
          # SCRAPE_PLZ is a *secret* (not a variable) so a personal postal code is masked
          # in the public Actions logs; falls back to a neutral central default if unset.
          PLZ: ${{ github.event.inputs.plz || secrets.SCRAPE_PLZ || '10115' }}
          # Optional: only enforced if ADMIN_TOKEN is also set on Render (else /api/reset is open).
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt: wiping + re-scraping (free-tier cold start can take ~30s)…"
            if curl -fsS --max-time 300 -X POST \
                 -H "X-Admin-Token: ${ADMIN_TOKEN}" \
                 "https://grocery-helper-sw6c.onrender.com/api/reset?plz=${PLZ}" \
                 -w "HTTP %{http_code} in %{time_total}s\n"; then
              exit 0
            fi
            echo "::warning::refresh attempt $attempt failed — retrying in 30s"
            sleep 30
          done
          echo "::error::refresh failed after 3 attempts"
          exit 1

      # A successful reset can still have produced BAD data (a chain silently skipped, a
      # feed shape drift collapsing the parse rates, samples instead of real offers). The
      # gate asserts the served OUTCOME against measured floors; a violation fails this
      # job, which flows into the exact same alert-issue + close-on-recovery machinery
      # below — no new plumbing. Prints counts only (the PLZ secret never echoes).
      - name: Data-quality gate on the served deals
        env:
          PLZ: ${{ github.event.inputs.plz || secrets.SCRAPE_PLZ || '10115' }}
        run: |
          python3 .github/scripts/verify_deals.py \
            --url "https://grocery-helper-sw6c.onrender.com/api/offers" --plz "${PLZ}"

      # A silent weekly failure is invisible; surface it as a (deduplicated) issue.
      - name: Alert on repeated failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The scheduled weekly refresh failed on ${new Date().toISOString()}.\n\nRun: ${run}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scrape-failure',
            });
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Weekly refresh failed',
                body,
                labels: ['scrape-failure'],
              });
            }

      # Completes the loop: a healthy refresh closes any open alert issue, so a
      # transient outage (or a merged self-heal fix) ends the cycle without
      # human bookkeeping. The local self-heal poller
      # (https://github.com/Ali0600/self-healing-script) consumes these issues.
      - name: Close recovery issues
        if: success()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scrape-failure',
            });
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Weekly refresh succeeded on ${new Date().toISOString()} — auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
