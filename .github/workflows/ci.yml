name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: jobs only read the repo; the deploy step uses a secret webhook.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest + alembic)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12' # matches backend/Dockerfile (Render runtime)
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml
      # Build the schema from migrations on a throwaway SQLite, then fail if the
      # ORM models have drifted from the migrations (a model change with no migration).
      - run: alembic upgrade head
      - run: alembic check
      # Optional: skipped (CI stays green) until the CODECOV_TOKEN secret is set.
      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v7
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend

  mobile:
    name: Mobile (eslint + tsc + jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --ci

  docker-build:
    name: Backend image builds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # Build-only (no push) so a broken Dockerfile/dependency fails here, not on Render.
      # Retry transient registry hiccups (e.g. Docker Hub 503 pulling the base image) so
      # an upstream blip doesn't fail the build.
      - name: Build backend image
        run: |
          for attempt in 1 2 3; do
            if docker build -f backend/Dockerfile backend; then
              exit 0
            fi
            echo "::warning::docker build attempt $attempt failed — retrying in 15s"
            sleep 15
          done
          echo "::error::docker build failed after 3 attempts"
          exit 1

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend, docker-build] # gate on the backend artifact's checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy."
            echo "Add the secret (and turn off Render auto-deploy) to enable gated deploys."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Triggered Render deploy."
