name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: jobs only read the repo; the deploy step uses a secret webhook.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest + alembic)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12' # matches backend/Dockerfile (Render runtime)
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check .
      # HYPOTHESIS_PROFILE=ci derandomizes the property tests (tests/conftest.py) so this
      # gate can never flake; randomness only hunts locally. --cov-fail-under is a ratchet:
      # set to the measured floor at the time of each change — raise it as coverage climbs,
      # never lower it to make a PR pass.
      - run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=85
        env:
          HYPOTHESIS_PROFILE: ci
      # Build the schema from migrations on a throwaway SQLite, then fail if the
      # ORM models have drifted from the migrations (a model change with no migration).
      - run: alembic upgrade head
      - run: alembic check
      # Optional: skipped (CI stays green) until the CODECOV_TOKEN secret is set.
      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend

  mobile:
    name: Mobile (eslint + tsc + jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      # --coverage enforces package.json's coverageThreshold — a ratchet set just under
      # the measured floor (collectCoverageFrom covers ALL of src/, so the number is
      # honest: untested files count, unlike jest's only-what-tests-import default).
      # Raise the floors as coverage climbs; never lower them to make a PR pass.
      - run: npm test -- --ci --coverage

  docker-build:
    name: Backend image builds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Build-only (no push) so a broken Dockerfile/dependency fails here, not on Render.
      # Retry transient registry hiccups (e.g. Docker Hub 503 pulling the base image) so
      # an upstream blip doesn't fail the build.
      - name: Build backend image
        run: |
          for attempt in 1 2 3; do
            if docker build -f backend/Dockerfile backend; then
              exit 0
            fi
            echo "::warning::docker build attempt $attempt failed — retrying in 15s"
            sleep 15
          done
          echo "::error::docker build failed after 3 attempts"
          exit 1

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    timeout-minutes: 25 # the verify steps poll a slow free-tier build+swap
    needs: [backend, docker-build] # gate on the backend artifact's checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2 # need HEAD~1 to diff what this merge changed
      # Only the backend runs on Render, so a mobile-only / docs merge doesn't need a
      # redeploy — and on the free tier a redeploy wipes the ephemeral DB (and re-scrapes
      # only DEFAULT_PLZ). Deploy when this merge touched a RUNTIME backend file, but skip
      # lint/test/example files that never enter the image (backend/Dockerfile COPYs only
      # app/, alembic/, requirements.txt). This is a denylist, NOT an allowlist of runtime
      # paths, so a NEW runtime file still deploys — err toward deploying: a missed deploy
      # ships stale code, an extra one just re-scrapes the ephemeral DB. A mixed change
      # (e.g. app/ + tests/) still deploys because the app/ line survives the filter.
      - name: Detect runtime-affecting backend changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^(backend/|render\.yaml$)' \
            | grep -vE '^backend/(ruff\.toml$|pytest\.ini$|\.env\.example$|tests/)' \
            || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Runtime-affecting backend files changed — will deploy:"
            echo "$CHANGED" | sed 's/^/  /'
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Only lint/test/example (or mobile/docs) files changed — skipping deploy."
          fi
      - name: Trigger Render deploy hook
        id: trigger
        if: steps.detect.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy."
            echo "Add the secret (and turn off Render auto-deploy) to enable gated deploys."
            echo "fired=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          before=$(curl -fsS --max-time 30 "https://grocery-helper-sw6c.onrender.com/health" \
            | python3 -c 'import sys,json;print(json.load(sys.stdin).get("commit") or "")' \
            2>/dev/null || true)
          echo "before=${before}" >> "$GITHUB_OUTPUT"
          echo "Commit live before this deploy: '${before:-unknown}'"
          curl -fsS -X POST "$HOOK"
          echo "fired=true" >> "$GITHUB_OUTPUT"
          echo "Triggered Render deploy."

      # The hook only TRIGGERS Render — "success" above means the curl fired, nothing
      # more; Render then builds + swaps for several minutes. This bit for real: a
      # feature shipped green and never appeared in prod because its degraded path fired
      # on every run. So: poll /health until the RUNNING commit is the merged SHA (the
      # backend exposes RENDER_GIT_COMMIT), then verify the served FEATURE, not the
      # trigger. If a newer merge deployed over us mid-poll, note it and stand down —
      # that run's own verify covers prod.
      - name: Wait until the new code is live
        if: steps.trigger.outputs.fired == 'true'
        env:
          BASE: https://grocery-helper-sw6c.onrender.com
        run: |
          want="${GITHUB_SHA}"
          echo "Waiting for /health to report commit ${want}…"
          for i in $(seq 1 45); do
            live=$(curl -fsS --max-time 30 "$BASE/health" | python3 -c \
              'import sys,json;print(json.load(sys.stdin).get("commit") or "")' 2>/dev/null || true)
            if [ "$live" = "$want" ]; then
              echo "New code is live (poll $i)."
              exit 0
            fi
            sleep 20
          done
          before="${{ steps.trigger.outputs.before }}"
          if [ -n "$live" ] && [ "$live" = "$before" ]; then
            # Fail CLOSED: still serving the pre-deploy commit after ~15 min means Render
            # never swapped — most likely its build failed. "Superseded" must not swallow this.
            echo "::error::prod still serves the pre-deploy commit (${live}) — the Render build likely failed"
            exit 1
          fi
          if [ -n "$live" ] && [ "$live" != "$want" ]; then
            echo "::warning::a different commit (${live}) is live — superseded by a newer deploy; standing down."
            exit 0
          fi
          echo "::error::deploy never became live within ~15 min (last seen commit: '${live:-none}')"
          exit 1

      - name: Verify the served deals (the feature, not the deploy)
        if: steps.trigger.outputs.fired == 'true'
        env:
          BASE: https://grocery-helper-sw6c.onrender.com
        run: |
          # The boot-scrape runs at startup; give it a few retries before judging.
          for i in $(seq 1 10); do
            count=$(curl -fsS --max-time 60 "$BASE/api/offers?plz=10115&limit=2000" \
              | python3 -c 'import sys,json;print(len(json.load(sys.stdin)))' 2>/dev/null || echo 0)
            echo "poll $i: served offers = $count"
            if [ "$count" -gt 0 ] 2>/dev/null; then
              echo "Prod serves data on the new code."
              exit 0
            fi
            sleep 30
          done
          echo "::error::prod serves no offers on the new deploy — the boot-scrape likely failed"
          exit 1
