name: EAS Update (OTA)

# Publishes an over-the-air JS/asset update to the production channel — but ONLY after
# the "CI" workflow succeeds on main, so a broken bundle can't ship to users. We trigger
# on workflow_run (not push) to gate on CI; workflow_run can't path-filter, so the job
# checks whether mobile/** actually changed in the merged commit and skips otherwise.
# OTA only reaches a build embedding expo-updates at the matching runtimeVersion
# (app.json `runtimeVersion.policy: appVersion`) — a fresh `eas build` is required once
# before updates land on installed apps.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only after a *successful* CI run on main (or a manual dispatch). workflow_run fires
    # regardless of the triggering run's conclusion, so the success gate is explicit.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # On workflow_run, the default checkout is the default branch HEAD; pin to the
          # exact commit that passed CI. Depth 2 so we can diff what that commit changed.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2

      # workflow_run has no paths filter, so replicate the old `paths: ['mobile/**']`
      # gate by diffing the merged commit. A manual dispatch always publishes.
      # Known limit: PRs squash-merge (HEAD~1..HEAD IS the PR diff), but a multi-commit
      # DIRECT push only diffs its head commit — a mobile change in an earlier commit of
      # such a push would skip the OTA. Rare; dispatch manually if it ever happens.
      - name: Did mobile/** change?
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch — publishing"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD | grep -q '^mobile/'; then
            echo "mobile/** changed — publishing"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "no mobile/** changes in this commit — skipping OTA"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Skip gracefully until the Expo token is configured, so the workflow stays green
      # before EAS Update is enabled (mirrors the Render deploy gate).
      - name: Check for EXPO_TOKEN
        if: steps.filter.outputs.changed == 'true'
        id: check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN not set — skipping OTA publish. Add the secret to enable EAS Update."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.has_token == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        if: steps.check.outputs.has_token == 'true'
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          # Pinned (not `latest`): a breaking eas-cli release must not be able to take
          # down the OTA pipeline on its own schedule. Bump deliberately.
          eas-version: 20.5.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.check.outputs.has_token == 'true'
        working-directory: mobile
        run: npm ci

      - name: Publish update to the production channel
        if: steps.check.outputs.has_token == 'true'
        working-directory: mobile
        env:
          # Inlined into the published JS bundle (EXPO_PUBLIC_*): the app's
          # "Wipe & re-scrape" needs it once ADMIN_TOKEN is enforced on the backend.
          # Extractable from the public bundle by design — a light guard, not a secret.
          # Publishes still work while the secret is unset (the reset button 403s then).
          EXPO_PUBLIC_ADMIN_TOKEN: ${{ secrets.EXPO_PUBLIC_ADMIN_TOKEN }}
        run: |
          MSG="$(git log -1 --pretty=%s)"
          eas update --branch production --message "$MSG" --non-interactive
