# Automated dependency updates. Minor/patch bumps are grouped into one PR per
# ecosystem to limit noise; majors still arrive as individual PRs for review.
version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend-minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']

  # No npm/mobile *version* updates on purpose: the app is Expo SDK-managed — react,
  # react-native, expo-*, jest-expo, etc. are a pinned lockstep set, so per-package bumps
  # break `npm ci` (e.g. react-native 0.86 vs jest-expo@56's RN 0.85 peer). Bump those
  # together via `npx expo install` during an SDK upgrade. Dependabot *security* updates
  # (CVE-driven, independent of this file) still cover npm — see mobile/.npmrc.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
