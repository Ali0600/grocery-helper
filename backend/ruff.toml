# Ruff config for the backend (linter + import sorter).
# Targets py312 — the dev venv, CI, and the Render Docker image all run Python 3.12. Rule
# set is kept pragmatic: real bugs (pyflakes F), syntax/whitespace (E/W), and import order
# (I); line-length checks (E501) are intentionally left off to avoid reflow churn. Note:
# `UP` (pyupgrade) is deliberately NOT selected, so bumping the target adds no modernization
# churn — it just stops flagging 3.10+ syntax as an error.
target-version = "py312"
line-length = 100
# Alembic's autogenerated migration scripts follow the tool's own template/style
# (import order, single quotes); don't fight the linter over generated files.
extend-exclude = ["alembic/versions"]

[lint]
select = ["E4", "E7", "E9", "F", "W", "I"]

[lint.isort]
known-first-party = ["app"]
# The backend/alembic/ dir would otherwise make ruff treat the `alembic` package
# as first-party and mis-sort its imports.
known-third-party = ["alembic"]
